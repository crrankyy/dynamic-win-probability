# XGBoost Hyperparameter Configurations
# Each entry in 'configs' is one combination to evaluate via temporal CV

configs:
  - n_estimators: 100
    max_depth: 4
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 1.0

  - n_estimators: 200
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 1.0

  - n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.9
    colsample_bytree: 0.9
    reg_alpha: 0.1
    reg_lambda: 1.0

  - n_estimators: 200
    max_depth: 8
    learning_rate: 0.1
    subsample: 0.7
    colsample_bytree: 0.7
    reg_alpha: 0.0
    reg_lambda: 2.0

  - n_estimators: 500
    max_depth: 4
    learning_rate: 0.01
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0

  - n_estimators: 300
    max_depth: 5
    learning_rate: 0.1
    subsample: 0.85
    colsample_bytree: 0.85
    reg_alpha: 0.5
    reg_lambda: 1.5
