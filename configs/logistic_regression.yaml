# Logistic Regression Hyperparameter Configurations
# Each entry in 'configs' is one combination to evaluate via temporal CV

configs:
  - C: 0.01
    penalty: "l2"
    solver: "lbfgs"
    max_iter: 1000

  - C: 0.1
    penalty: "l2"
    solver: "lbfgs"
    max_iter: 1000

  - C: 1.0
    penalty: "l2"
    solver: "lbfgs"
    max_iter: 1000

  - C: 10.0
    penalty: "l2"
    solver: "lbfgs"
    max_iter: 1000

  - C: 0.1
    penalty: "l1"
    solver: "saga"
    max_iter: 2000

  - C: 1.0
    penalty: "l1"
    solver: "saga"
    max_iter: 2000

  - C: 10.0
    penalty: "l1"
    solver: "saga"
    max_iter: 2000

  - C: 1.0
    penalty: "elasticnet"
    solver: "saga"
    l1_ratio: 0.5
    max_iter: 2000
