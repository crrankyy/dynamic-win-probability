    num_layers: 1
    dropout: 0.2
    learning_rate: 0.001
    batch_size: 64
    epochs: 30
    sequence_length: 120

  - hidden_dim: 128
    num_layers: 2
    dropout: 0.3
    learning_rate: 0.001
    batch_size: 64
    epochs: 30
    sequence_length: 120

  - hidden_dim: 64
    num_layers: 2
    dropout: 0.2
    learning_rate: 0.0005
